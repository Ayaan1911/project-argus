version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install fastapi==0.109.2 "uvicorn[standard]==0.27.1" boto3==1.34.40 python-multipart==0.0.9 "pydantic>=2.6.1" "pydantic-settings>=2.2.1" python-dotenv==1.0.1 beautifulsoup4==4.12.3 requests==2.31.0 openai>=1.0.0 joblib>=1.3.2
      - pip install "pandas>=2.2.0" "numpy>=1.26.0" "scikit-learn>=1.4.0"
      - pip install "playwright>=1.42.0"
run:
  command: bash start.sh
  network:
    port: 8080
