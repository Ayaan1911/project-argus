version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install fastapi uvicorn boto3 python-dotenv openai scikit-learn pandas numpy requests beautifulsoup4 python-multipart pydantic pydantic-settings joblib
run:
  command: uvicorn main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
    env: HTTP
